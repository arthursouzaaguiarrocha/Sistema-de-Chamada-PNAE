<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - PNAE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>
<body>
<div class="wrapper">
    <div class="container">
        <img src="{{ url_for('static', filename='imagens/pnae_old_lg.png') }}">

        <h1>Criar Conta</h1>
        
        <form action="/cadastro" method="POST">
            <label>Email</label>
            <input type="email" name="email" required placeholder="Digite seu email:">

            <label>Senha</label>
            <input type="password" name="senha" required placeholder="Digite sua senha:">

            <label>Confirmar Senha</label>
            <input type="password" name="senha2" required placeholder="Confirmar Senha">

            <button type="submit">Cadastrar</button>
        </form>
    </div>
</div>

</body>
</html>
